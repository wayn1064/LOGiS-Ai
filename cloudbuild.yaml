steps:
  # 1. Backend: Install dependencies and build
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    dir: 'backend'
    id: 'backend-install'

  # 2. Backend: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/logis-ai-backend', '.']
    dir: 'backend'
    id: 'backend-docker-build'

  # 3. Backend: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/logis-ai-backend']
    id: 'backend-docker-push'

  # 4. Frontend: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/logis-ai-frontend', '.']
    dir: 'frontend'
    id: 'frontend-docker-build'

  # 5. Frontend: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/logis-ai-frontend']
    id: 'frontend-docker-push'

  # 6. Backend: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'logis-ai-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/logis-ai-backend'
      - '--region'
      - 'asia-northeast3' # Seoul region, change if needed
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '5001'
      - '--min-instances'
      - '1'
      - '--set-env-vars'
      - 'DATABASE_URL=postgresql://postgres:!zxasqw12%40@34.64.78.99:5432/LOGiS-Ai-db?schema=public'
    id: 'backend-deploy'

  # 7. Frontend: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'logis-ai-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/logis-ai-frontend'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--min-instances'
      - '1'
    id: 'frontend-deploy'

images:
  - 'gcr.io/$PROJECT_ID/logis-ai-backend'
  - 'gcr.io/$PROJECT_ID/logis-ai-frontend'
