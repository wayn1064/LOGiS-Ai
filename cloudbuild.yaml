steps:
  # 1. Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/denti-ai-frontend:$COMMIT_SHA', './frontend']
    id: 'build-frontend'

  # 2. Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/denti-ai-frontend:$COMMIT_SHA']
    id: 'push-frontend'

  # 3. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'denti-ai-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/denti-ai-frontend:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--port'
      - '8080'
    id: 'deploy-frontend'

  # 4. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/denti-ai-backend:$COMMIT_SHA', './backend']
    id: 'build-backend'

  # 5. Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/denti-ai-backend:$COMMIT_SHA']
    id: 'push-backend'

  # 6. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'denti-ai-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/denti-ai-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--port'
      - '5001'
    id: 'deploy-backend'

images:
  - 'gcr.io/$PROJECT_ID/denti-ai-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/denti-ai-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
